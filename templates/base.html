<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stablecoin Yield Summarizer{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg"></div>
    <div class="grid-overlay"></div>

    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/">
                <div class="brand-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M12 6v12M8 9.5c0-1.38 1.79-2.5 4-2.5s4 1.12 4 2.5c0 1.93-2.5 2.5-4 4m0 2.5v.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="brand-text">Yield<span class="brand-accent">Terminal</span></span>
            </a>

            <div class="nav-status">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="last-updated">Connecting...</span>
                </div>
                <button class="refresh-btn" id="refresh-btn" title="Refresh Data">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-2.636-6.364"/>
                        <path d="M21 3v6h-6"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-inner">
            <div class="footer-left">
                <span class="footer-badge">27+ PROTOCOLS</span>
                <span class="footer-divider"></span>
                <span class="footer-text">Real-time DeFi yield aggregation</span>
            </div>
            <div class="footer-right">
                <span class="footer-text">Data refreshes every 5 minutes</span>
            </div>
        </div>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
